<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide2Study V3G</title>
    <link rel="stylesheet" href="./styles.css?v=20260524b" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <p>Slide2Study V3G</p>
          <h1>PPT 讲解还原 Agent</h1>
        </div>
        <a class="text-link" href="/api/health" target="_blank" rel="noreferrer">服务状态</a>
      </section>

      <section class="workspace">
        <aside class="side">
          <form id="uploadForm" class="upload-box">
            <label for="deckInput">选择 .pptx</label>
            <input id="deckInput" name="deck" type="file" accept=".pptx" required />
            <button id="convertButton" type="submit">开始转换</button>
          </form>

          <section class="status-block" aria-live="polite">
            <h2>转换状态</h2>
            <ol id="statusList">
              <li>等待上传</li>
              <li>上传并解析 PPTX</li>
              <li>生成分析和导读计划</li>
              <li>LibreOffice 生成 base.pdf</li>
              <li>生成 guide.pdf、compare.html 和指标</li>
            </ol>
          </section>

          <section class="warning-block">
            <h2>问题报告</h2>
            <div id="warningList">暂无</div>
          </section>

          <section id="aiPanel" class="ai-panel">
            <h2>AI 设置</h2>
            <div class="ai-controls">
              <label for="apiKeyInput">API Key</label>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />

              <label for="baseUrlInput">Base URL</label>
              <input id="baseUrlInput" type="url" autocomplete="off" placeholder="默认 OpenAI 兼容接口" />

              <label for="modelInput">Model</label>
              <input id="modelInput" type="text" autocomplete="off" value="gpt-4.1-mini" />

              <label for="promptProfileSelect">解释角色</label>
              <select id="promptProfileSelect">
                <option value="study">学习讲义版</option>
                <option value="training">工作培训版</option>
                <option value="simple">简单解释版</option>
              </select>

              <label class="checkbox-control" for="includeImagesInput">
                <input id="includeImagesInput" type="checkbox" checked />
                发送页面图片
              </label>

              <div class="ai-actions">
                <button id="composeButton" type="button">组合讲解</button>
                <button id="exportAIButton" class="secondary-button" type="button">生成 AI PDF</button>
                <button id="clearApiKeyButton" class="secondary-button" type="button">清空 Key</button>
              </div>
            </div>
            <div id="selectedSummary" class="selected-summary">尚未选择知识块</div>
            <div id="blockList" class="block-list">转换后显示当前页知识块</div>
            <div id="aiOutput" class="ai-output" aria-live="polite"></div>
          </section>
        </aside>

        <section class="result">
          <header class="result-header">
            <div>
              <p>Preview</p>
              <h2 id="resultTitle">转换结果预览</h2>
            </div>
            <nav id="downloadLinks"></nav>
          </header>
          <section id="reader" class="reader" hidden>
            <div class="reader-main">
              <div class="reader-tools">
                <div id="pageTabs" class="page-tabs" aria-label="页码"></div>
                <button id="sendPageButton" class="send-page-button" type="button">发送本页</button>
                <span id="readerHint" class="reader-hint"></span>
              </div>
              <div id="guidePageStage" class="guide-stage">转换后显示 guide 页图</div>
            </div>
            <aside id="explanationPanel" class="explanation-panel" aria-live="polite"></aside>
          </section>
          <details class="debug-details">
            <summary>调试与报告</summary>
            <nav id="debugLinks"></nav>
          </details>
          <iframe id="previewFrame" class="fallback-frame" title="PDF 备用预览"></iframe>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260524b"></script>
  </body>
</html>
